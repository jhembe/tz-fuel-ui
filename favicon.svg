<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="#0f2937"/>
  <!-- Fuel pump body -->
  <rect x="10" y="16" width="18" height="22" rx="2" fill="#f59e0b"/>
  <!-- Fuel pump nozzle area -->
  <rect x="12" y="19" width="14" height="10" rx="1.5" fill="#0f2937"/>
  <!-- Hose -->
  <path d="M28 20 C34 20 34 14 30 14" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Nozzle -->
  <rect x="27" y="11" width="5" height="7" rx="1.5" fill="#f59e0b"/>
  <!-- Pump stand/base -->
  <rect x="9" y="37" width="20" height="3" rx="1.5" fill="#f59e0b"/>
  <!-- Screen on pump -->
  <rect x="13" y="20" width="12" height="8" rx="1" fill="#1e3a4c"/>
  <!-- Screen content (fuel drop icon) -->
  <circle cx="19" cy="24" r="2.5" fill="#f59e0b"/>
</svg>
